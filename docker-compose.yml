version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekattor8_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./public/uploads:/var/www/html/public/uploads
      - ./publicassets:/var/www/html/publicassets
    ports:
      - "8000:80"
    networks:
      - ekattor8_network
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ekattor8
      - DB_USERNAME=ekattor8_user
      - DB_PASSWORD=ekattor8_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_ENV=production
      - APP_DEBUG=false

  db:
    image: mysql:8.0
    container_name: ekattor8_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ekattor8
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: ekattor8_user
      MYSQL_PASSWORD: ekattor8_password
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ekattor8_network

  redis:
    image: redis:7-alpine
    container_name: ekattor8_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ekattor8_network

  nginx:
    image: nginx:alpine
    container_name: ekattor8_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./public:/var/www/html/public
      - ./storage/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - ekattor8_network

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  ekattor8_network:
    driver: bridge
