version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekattor8_app_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./public/uploads:/var/www/html/public/uploads
      - ./publicassets:/var/www/html/publicassets
    ports:
      - "8000:80"
    networks:
      - ekattor8_network
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ekattor8_dev
      - DB_USERNAME=ekattor8_user
      - DB_PASSWORD=ekattor8_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_ENV=local
      - APP_DEBUG=true

  db:
    image: mysql:8.0
    container_name: ekattor8_db_dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ekattor8_dev
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: ekattor8_user
      MYSQL_PASSWORD: ekattor8_password
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    ports:
      - "3307:3306"
    volumes:
      - db_dev_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ekattor8_network

  redis:
    image: redis:7-alpine
    container_name: ekattor8_redis_dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - ekattor8_network

volumes:
  db_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  ekattor8_network:
    driver: bridge
